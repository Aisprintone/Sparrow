version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sparrow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sparrow_root_password
      MYSQL_DATABASE: sparrow_db
      MYSQL_USER: sparrow_user
      MYSQL_PASSWORD: sparrow_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - sparrow_network

volumes:
  mysql_data:

networks:
  sparrow_network:
    driver: bridge 